<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Studio | Face Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-hover: #4f46e5; --bg-base: #000000; --card-bg: #09090b; --border-light: rgba(255, 255, 255, 0.1); --text-muted: #a1a1aa; }
        
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 100px 20px 60px 20px; box-sizing: border-box; background-color: var(--bg-base); color: #ffffff; transition: background 0.8s ease; }
        
        /* Floating Pill Nav */
        .top-nav { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 8px 12px 8px 24px; display: flex; align-items: center; justify-content: space-between; background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid var(--border-light); border-radius: 50px; z-index: 1000; width: 90%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-brand { font-weight: 600; font-size: 0.95rem; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        .nav-brand span { color: var(--primary); }
        .nav-actions { display: flex; gap: 8px; }
        .nav-btn { padding: 6px 14px; border-radius: 20px; font-weight: 500; font-size: 0.8rem; cursor: pointer; color: white; border: 1px solid transparent; transition: 0.2s; text-decoration: none; }
        .nav-btn:hover { background: rgba(255,255,255,0.1); }
        .btn-logout { background: #18181b; border-color: var(--border-light); }
        .btn-admin { background: white; color: black; display: none; }
        .btn-admin:hover { background: #e4e4e7; }

        .container { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 100%; max-width: 650px; border: 1px solid var(--border-light); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        .header-section { text-align: center; margin-bottom: 40px; }
        h2 { margin: 0 0 10px 0; font-size: 2rem; letter-spacing: -1px; font-weight: 700; background: linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: var(--text-muted); font-size: 0.95rem; margin: 0; }
        
        .badge { display: inline-flex; align-items: center; gap: 6px; margin: 15px auto 0 auto; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-ai { background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2); }
        .badge-manual { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }

        .form-group { margin-bottom: 25px; }
        label.field-label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.85rem; color: #d4d4d8; }
        
        input[type="text"], input[type="number"], .search-bar { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border-light); background: #18181b; color: white; box-sizing: border-box; font-size: 0.95rem; transition: 0.2s; font-family: inherit; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }

        .upload-dropzone { border: 1px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 35px 20px; text-align: center; background: #18181b; cursor: pointer; transition: 0.2s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upload-dropzone:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .file-count-badge { background: white; color: black; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; margin-top: 12px; display: inline-block; font-weight: 600; }

        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 10px; background: white; color: black; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: 0.2s; font-family: inherit; margin-top: 10px; }
        .btn-main:hover { background: #e4e4e7; transform: translateY(-1px); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #manual-rating-wizard { display: none; flex-direction: column; align-items: center; background: #18181b; padding: 30px; border-radius: 12px; border: 1px solid var(--border-light); text-align: center; margin-top: 20px; }
        #current-rating-image { max-width: 100%; max-height: 280px; border-radius: 8px; margin: 0 auto 20px auto; display: block; object-fit: contain; }
        .live-average-box { margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-light); border-radius: 8px; color: #e4e4e7; font-size: 0.9rem; font-weight: 500; display: none; width: 100%; box-sizing: border-box;}

        #recent-gallery-section { width: 100%; max-width: 1000px; margin: 60px auto 0 auto; display: none; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 25px; }
        .gallery-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border-light); transition: 0.2s; }
        .gallery-card:hover { border-color: rgba(255,255,255,0.3); }
        .gallery-card img { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid var(--border-light); }
        .gallery-info { padding: 15px; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-brand"><span>⚡</span> Workspace</div>
    <div class="nav-actions">
        <a href="/admin.html" id="adminPanelBtn" class="nav-btn btn-admin">Admin Dashboard</a>
        <button class="nav-btn btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="header-section">
        <h2>Analysis Studio</h2>
        <p class="subtitle">Upload media to generate standardized AI metrics.</p>
        <div id="modeBadge" class="badge">Loading Mode...</div>
    </div>

    <form id="ratingForm">
        <div class="form-group">
            <label class="field-label">Subject Identification</label>
            <input type="text" id="subjectName" required placeholder="Enter full name or ID">
        </div>

        <div class="form-group">
            <label class="field-label">Media Upload</label>
            <label class="upload-dropzone" for="imageInput" id="dropzoneContainer">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 10px; color: var(--text-muted);"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span style="font-weight: 500; font-size: 0.95rem;">Click or drag images here</span>
                <span style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px;">JPG, PNG up to 10MB</span>
                <input type="file" id="imageInput" multiple accept="image/*" style="display: none;" required>
                <div id="fileCount" class="file-count-badge" style="display: none;">0 files selected</div>
            </label>
        </div>

        <div id="manual-rating-wizard">
            <h4 style="margin-top: 0; margin-bottom: 20px; color: var(--text-muted); font-weight: 500; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Image <span id="currentImageNum">1</span> of <span id="totalImageNum">X</span></h4>
            <img id="current-rating-image" src="" alt="Preview">
            <div class="form-group" style="width: 100%; text-align: left;">
                <label class="field-label">Manual Score</label>
                <input type="number" id="currentManualScore" step="0.1" min="1" max="10" placeholder="0.0 - 10.0">
            </div>
            <button type="button" id="nextImageBtn" class="btn-main" style="background: var(--primary); color: white;">Save & Next</button>
            <div id="liveAverageDisplay" class="live-average-box">Session Average: <span id="liveAvgValue" style="float: right; font-weight: bold; color: white;">0.00</span></div>
        </div>

        <button type="submit" id="mainSubmitBtn" class="btn-main">Initialize Analysis</button>
    </form>
</div>

<div id="recent-gallery-section">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;">
        <h3 style="margin: 0; font-size: 1.2rem; font-weight: 600;">Recent Analysis</h3>
        <input type="text" id="gallerySearch" class="search-bar" placeholder="Search records..." style="max-width: 200px; padding: 8px 12px; font-size: 0.85rem; border-radius: 6px;">
    </div>
    <div id="galleryContainer" class="gallery-grid"></div>
</div>

<script>
    let isManualMode = false; let compressedFiles = []; let manualRatingsArray = []; let currentRatingIndex = 0; let allGalleryData = [];

    async function initializePage() {
        try {
            const bgRes = await fetch('/api/settings/background'); const bgData = await bgRes.json();
            if (bgData.bg_url) { document.body.style.background = `linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)), url('${bgData.bg_url}') no-repeat center center fixed`; document.body.style.backgroundSize = 'cover'; }
            const res = await fetch('/api/settings/mode'); if (res.status === 401) { window.location.href = '/login.html'; return; }
            const data = await res.json(); isManualMode = (data.mode === 'manual');
            if (data.role === 'admin') document.getElementById('adminPanelBtn').style.display = 'block';
            const badge = document.getElementById('modeBadge'); badge.className = isManualMode ? 'badge badge-manual' : 'badge badge-ai'; badge.innerHTML = isManualMode ? '✍️ Manual Entry Mode' : '🤖 Cloud AI Mode';
            const galRes = await fetch('/api/settings/gallery'); if(galRes.ok) { const galData = await galRes.json(); if(galData.visible) document.getElementById('recent-gallery-section').style.display = 'block'; }
        } catch (e) { console.error(e); }
    }
    initializePage();

    document.getElementById('imageInput').addEventListener('change', async function(e) {
        const countBadge = document.getElementById('fileCount'); countBadge.style.display = 'inline-block'; countBadge.innerText = "Processing...";
        compressedFiles = [];
        for (let file of e.target.files) { let compressedBlob = await compressImage(file); compressedFiles.push(new File([compressedBlob], file.name, {type: 'image/jpeg'})); }
        countBadge.innerText = `${compressedFiles.length} file(s) ready`;
    });

    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = event => { const img = new Image(); img.src = event.target.result; img.onload = () => { const canvas = document.createElement('canvas'); const scaleSize = 800 / img.width; canvas.width = 800; canvas.height = img.height * scaleSize; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); canvas.toBlob(resolve, 'image/jpeg', 0.8); }; };
        });
    }

    document.getElementById('ratingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (compressedFiles.length === 0) return alert("Please select media.");
        if (isManualMode && document.getElementById('manual-rating-wizard').style.display !== 'flex') {
            document.getElementById('mainSubmitBtn').style.display = 'none'; document.getElementById('dropzoneContainer').style.display = 'none'; document.getElementById('manual-rating-wizard').style.display = 'flex'; currentRatingIndex = 0; manualRatingsArray = []; showNextImageToRate();
        } else if (!isManualMode) submitDataToServer();
    });

    function showNextImageToRate() {
        if (currentRatingIndex >= compressedFiles.length) { submitDataToServer(); return; }
        document.getElementById('currentImageNum').innerText = currentRatingIndex + 1; document.getElementById('totalImageNum').innerText = compressedFiles.length; document.getElementById('current-rating-image').src = URL.createObjectURL(compressedFiles[currentRatingIndex]); document.getElementById('currentManualScore').value = ''; document.getElementById('currentManualScore').focus();
    }

    document.getElementById('currentManualScore').addEventListener('keypress', function(e) { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('nextImageBtn').click(); } });

    document.getElementById('nextImageBtn').addEventListener('click', function() {
        const score = parseFloat(document.getElementById('currentManualScore').value);
        if (isNaN(score) || score < 1 || score > 10) return alert("Valid score 1.0-10.0 required.");
        manualRatingsArray.push(score);
        document.getElementById('liveAvgValue').innerText = (manualRatingsArray.reduce((a, b) => a + b, 0) / manualRatingsArray.length).toFixed(2);
        document.getElementById('liveAverageDisplay').style.display = 'block';
        currentRatingIndex++; showNextImageToRate();
    });

    async function submitDataToServer() {
        const formData = new FormData(); formData.append('name', document.getElementById('subjectName').value);
        compressedFiles.forEach(file => formData.append('images', file)); manualRatingsArray.forEach(rating => formData.append('ratings', rating));
        document.getElementById('manual-rating-wizard').style.display = 'none'; document.getElementById('mainSubmitBtn').style.display = 'block'; document.getElementById('mainSubmitBtn').disabled = true; document.getElementById('mainSubmitBtn').innerText = 'Processing Sequence...';
        try { const response = await fetch('/api/rate', { method: 'POST', body: formData }); if (response.ok) { window.location.reload(); } else { alert("Upload error."); document.getElementById('mainSubmitBtn').disabled = false; document.getElementById('mainSubmitBtn').innerText = 'Initialize Analysis'; } } catch (err) { alert("Network Error."); }
    }

    async function loadGallery() {
        try { const res = await fetch('/api/data'); if (!res.ok) return; allGalleryData = await res.json(); renderGallery(allGalleryData); } catch (err) { console.error(err); }
    }

    function renderGallery(data) {
        const container = document.getElementById('galleryContainer'); container.innerHTML = '';
        data.forEach(item => {
            container.innerHTML += `
            <div class="gallery-card">
                <img src="${item.image || 'https://via.placeholder.com/300'}" alt="${item.name}">
                <div class="gallery-info">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <h3 style="margin: 0; font-size: 1rem; font-weight: 600;">${item.name}</h3>
                        <span style="font-weight: 700; color: white;">⭐ ${item.rating}</span>
                    </div>
                    <div style="display: flex; gap: 8px; font-size: 0.75rem; color: var(--text-muted); font-weight: 500;">
                        <span style="background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 4px;">${item.emotion || 'Manual'}</span>
                        <span style="background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 4px;">Age: ${item.age || '?'}</span>
                    </div>
                    <p style="font-size: 0.8rem; color: #71717a; margin-top: 12px; line-height: 1.4;">"${item.comment || 'No notes.'}"</p>
                </div>
            </div>`;
        });
    }

    document.getElementById('gallerySearch').addEventListener('input', (e) => { 
        const term = e.target.value.toLowerCase(); 
        const filtered = allGalleryData.filter(item => item.name.toLowerCase().includes(term) || (item.emotion && item.emotion.toLowerCase().includes(term)));
        renderGallery(filtered); 
    });

    document.addEventListener('DOMContentLoaded', loadGallery);
    async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.href = '/login.html'; }
</script>
</body>
</html>
